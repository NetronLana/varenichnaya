<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Dish</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Edit Dish</h1>

<form th:action="@{'/dishes/update/' + ${dish.id}}" method="post">

    <label>Name:</label>
    <input type="text" name="name" th:value="${dish.name}">
    <br><br>

    <label>Description:</label>
    <input type="text" name="description" th:value="${dish.description}">
    <br><br>

    <label>Price:</label>
    <input type="number" step="0.01" name="price" th:value="${dish.price}">
    <br><br>

    <label>Available:</label>
    <input type="checkbox" name="available" th:checked="${dish.available}">
    <br><br>

    <button type="submit">Update Dish</button>

</form>

</body>
</html>
