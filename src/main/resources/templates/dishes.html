<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Varenichnaya</title>
<meta charset="UTF-8">
</head>
<body>

	<h1>Varenichnaya Menu</h1>

	<table border="1">
		<tr>
			<th>ID</th>
			<th>Name</th>
			<th>Description</th>
			<th>Price</th>
			<th>Available</th>
			<th>Actions</th>
		</tr>

		<tr th:each="dish : ${dishes}">
			<td th:text="${dish.id}"></td>
			<td th:text="${dish.name}"></td>
			<td th:text="${dish.description}"></td>
			<td th:text="${dish.price}"></td>
			<td th:text="${dish.available}"></td>

			<td><a th:href="@{'/dishes/edit/' + ${dish.id}}">Edit</a>

				<form th:action="@{'/dishes/delete/' + ${dish.id}}" method="post">
					<button type="submit">Delete</button>
				</form></td>
		</tr>

	</table>

	<h2>Add New Dish</h2>

	<form action="/dishes" method="post">

		<label>Name:</label>
		<input type="text" name="name"><br> <br>
		<label>Description:</label>
		<input type="text" name="description"><br> <br>
		<label>Price:</label>
		<input type="number" step="0.01" name="price"><br> <br>
		<label>Available:</label>
		<input type="checkbox" name="available"><br> <br>

		<button type="submit">Add Dish</button>

	</form>

</body>
</html>
